<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Taffy</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #chat {
      width: 95%;
      max-width: 500px;
      height: 90vh;
      background: white;
      border-radius: 16px;
      border: 1px solid #e0e0e0;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 14px 16px;
      border-bottom: 1px solid #e0e0e0;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    #messages {
      -webkit-flex: 1;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 10px;
      word-wrap: break-word;
    }

    .user {
      margin-left: auto;
      background: #e8f0fe;
      border-bottom-right-radius: 4px;
    }

    .bot {
      margin-right: auto;
      background: #f0f0f0;
      border-bottom-left-radius: 4px;
    }

    #footer {
      padding: 12px;
      border-top: 1px solid #e0e0e0;
      display: -webkit-flex;
      display: flex;
      gap: 8px;
    }

    #input {
      -webkit-flex: 1;
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: 2px solid #ddd;
      font-size: 16px;
      outline: none;
    }

    #btn {
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      background: #1a73e8;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      min-width: 90px;
    }
  </style>
</head>

<body>
  <div id="chat">
    <div id="header">Taffy ☕</div>
    <div id="messages">
      <div class="msg bot">Hola, ¿en qué te puedo ayudar?</div>
    </div>
    <div id="footer">
      <input type="text" id="input" placeholder="Escribe tu mensaje..." />
      <button id="btn" onclick="enviar()">Enviar</button>
    </div>
  </div>

  <script type="text/javascript">
    var SERVER = "";
    var messages = document.getElementById('messages');
    var input = document.getElementById('input');

    document.getElementById('input').onkeydown = function (e) {
      var key = e.keyCode || e.which;
      if (key === 13) enviar();
    };

    document.getElementById('btn').onclick = enviar;

    function addMsg(texto, tipo) {
      var div = document.createElement('div');
      div.className = 'msg ' + tipo;
      div.innerHTML = texto;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function enviar() {
      var texto = input.value;
      if (!texto || texto.trim() === '') return;
      input.value = '';
      addMsg(texto, 'user');
      var botMsg = addMsg('Escribiendo...', 'bot');

      var xhr = new XMLHttpRequest();
      xhr.open('POST', SERVER + '/chat-voz', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.responseType = 'blob';

      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var textoRespuesta = xhr.getResponseHeader('X-Texto');
          botMsg.innerHTML = textoRespuesta || 'Respuesta recibida';

          var blob = xhr.response;
          var url = URL.createObjectURL(blob);
          var audio = new Audio(url);
          audio.play();

          messages.scrollTop = messages.scrollHeight;
        }
      };

      xhr.onerror = function () {
        botMsg.innerHTML = 'Error de conexión.';
      };

      xhr.send(JSON.stringify({ texto: texto }));
    }

  </script>
</body>

</html>
